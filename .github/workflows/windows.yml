name: Windows

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install vcredist
        shell: pwsh
        run: |
          curl -o VC_redist.x64.exe -L https://aka.ms/vs/17/release/vc_redist.x64.exe
          Start-Process VC_redist.x64.exe -ArgumentList "/install /quiet /norestart" -Wait

      - name: Install bucky command
        run: go install .

      - name: Install whisper.cpp libraries
        # No -v: `bucky install` falls back to download.DefaultWhisperVersion
        # baked into pkg/download. CI never silently tracks whisper.cpp's
        # latest tag — bumping that constant in code is the rollover.
        # whisper-bin-x64.zip is unpacked to expose whisper.dll plus the
        # ggml-* DLL siblings.
        run: |
          bucky install -lib ${env:GITHUB_WORKSPACE}/lib

      - name: Set BUCKY_LIB and PATH
        # whisper.dll dynamically loads ggml-base.dll / ggml-cpu.dll / ggml.dll
        # from the same directory; add it to PATH so they are discoverable.
        run: |
          echo "${env:GITHUB_WORKSPACE}/lib" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          echo "BUCKY_LIB=${env:GITHUB_WORKSPACE}/lib" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build examples
        shell: bash
        run: |
          set -e
          for dir in ./examples/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir..."
              go build -o /dev/null "$dir"
            fi
          done

      - name: Cache test models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models
          key: ${{ runner.os }}-bucky-models-v1

      - name: Download test models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./models
          bucky model get -y --show-progress=false -o ${env:GITHUB_WORKSPACE}/models tiny
          bucky model get -y --show-progress=false -o ${env:GITHUB_WORKSPACE}/models silero-vad

      - name: Set test env
        run: |
          echo "BUCKY_TEST_MODEL=${env:GITHUB_WORKSPACE}/models/ggml-tiny.bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "BUCKY_TEST_AUDIO=${env:GITHUB_WORKSPACE}/samples/jfk.wav" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "BUCKY_VAD_MODEL=${env:GITHUB_WORKSPACE}/models/ggml-silero-v5.1.2.bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run unit tests
        # Confirms WhisperFullParams sizeof + by-ref/by-value round-trip on
        # the windows/amd64 ABI (LLP64, 4-byte int, 8-byte size_t/ptr).
        run: |
          go test -count=1 ./...

      - name: Run hello example
        run: go run ./examples/hello samples/jfk.wav
