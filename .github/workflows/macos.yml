name: macOS
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install bucky command
        run: go install .

      - name: Install whisper.cpp libraries
        # Default install pulls the v1.8.4 xcframework with Metal. The
        # pinned version lives in pkg/download (whisper.cpp release tag).
        run: |
          set -e
          bucky install -lib $GITHUB_WORKSPACE/lib

      - name: Set BUCKY_LIB
        run: echo "BUCKY_LIB=$GITHUB_WORKSPACE/lib" >> "$GITHUB_ENV"

      - name: Build examples
        run: |
          set -e
          for dir in ./examples/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir..."
              go build -o /dev/null "$dir"
            fi
          done

      - name: Cache test models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models
          key: ${{ runner.os }}-bucky-models-v1

      - name: Download test models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ./models
          bucky model get -y --show-progress=false -o $GITHUB_WORKSPACE/models tiny
          bucky model get -y --show-progress=false -o $GITHUB_WORKSPACE/models silero-vad

      - name: Run unit tests
        run: |
          export BUCKY_TEST_MODEL=$GITHUB_WORKSPACE/models/ggml-tiny.bin
          export BUCKY_TEST_AUDIO=$GITHUB_WORKSPACE/samples/jfk.wav
          export BUCKY_VAD_MODEL=$GITHUB_WORKSPACE/models/ggml-silero-v5.1.2.bin
          go test -count=1 ./...

      - name: Run hello example
        run: |
          export BUCKY_TEST_MODEL=$GITHUB_WORKSPACE/models/ggml-tiny.bin
          go run ./examples/hello samples/jfk.wav
