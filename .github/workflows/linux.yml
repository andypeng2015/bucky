name: Linux
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Linux libraries (libwhisper.so + libggml*.so) are produced by
# ardanlabs/bucky-builder and pulled by `bucky install`, mirroring how
# macOS pulls the upstream xcframework and Windows pulls the upstream zip.
# LD_LIBRARY_PATH is set so libwhisper.so can resolve its libggml*.so
# dependencies regardless of how bucky-builder set the binary's RUNPATH.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -s -d .)
          if [ -n "$out" ]; then
            echo "::error::gofmt -s reported diffs:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Install static analysis tools
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

      - name: Install bucky command
        run: go install .

      - name: Install whisper.cpp libraries
        # No -v: `bucky install` falls back to download.DefaultWhisperVersion
        # baked into pkg/download. CI never silently tracks whisper.cpp's
        # latest tag — bumping that constant in code is the rollover.
        run: |
          set -e
          bucky install -lib $GITHUB_WORKSPACE/lib

      - name: Set BUCKY_LIB and LD_LIBRARY_PATH
        # LD_LIBRARY_PATH is required so the dynamic loader can find
        # libggml-base.so / libggml-cpu.so / libggml.so when libwhisper.so
        # is dlopen'd. macOS/Windows don't need this — macOS ships a single
        # universal dylib in the xcframework, and Windows resolves DLLs
        # from the same directory automatically.
        run: |
          echo "BUCKY_LIB=$GITHUB_WORKSPACE/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/lib" >> "$GITHUB_ENV"

      - name: Build all
        run: go build ./...

      - name: Build examples
        run: |
          set -e
          for dir in ./examples/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir..."
              go build -o /dev/null "$dir"
            fi
          done

      - name: Cache test models
        id: cache-models
        uses: actions/cache@v5
        with:
          path: models
          key: ${{ runner.os }}-bucky-models-v1

      - name: Download test models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ./models
          bucky model get -y --show-progress=false -o $GITHUB_WORKSPACE/models tiny
          bucky model get -y --show-progress=false -o $GITHUB_WORKSPACE/models silero-vad

      - name: Run unit tests
        # BUCKY_USE_GPU=0 forces UseGPU off in the test setup helpers. The
        # bucky-builder CPU-only artifacts compile in the GPU init
        # scaffolding but register no GPU backend, so the upstream default
        # of use_gpu=1 makes ggml_backend_dev_init assert with device==NULL.
        # macOS doesn't need this (Metal is in the xcframework). When this
        # CI starts using the cuda/vulkan artifacts, drop the env var.
        run: |
          export BUCKY_TEST_MODEL=$GITHUB_WORKSPACE/models/ggml-tiny.bin
          export BUCKY_TEST_AUDIO=$GITHUB_WORKSPACE/samples/jfk.wav
          export BUCKY_VAD_MODEL=$GITHUB_WORKSPACE/models/ggml-silero-v5.1.2.bin
          export BUCKY_USE_GPU=0
          go test -count=1 ./...

      - name: Run hello example
        # BUCKY_USE_GPU=0: see explanation on the unit-tests step above.
        run: |
          export BUCKY_TEST_MODEL=$GITHUB_WORKSPACE/models/ggml-tiny.bin
          export BUCKY_USE_GPU=0
          go run ./examples/hello samples/jfk.wav
